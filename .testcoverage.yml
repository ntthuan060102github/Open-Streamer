# go-test-coverage config — defines what counts toward "100% coverage" and
# what is justifiably excluded.
#
# Run locally:
#   make cover && go run github.com/vladopajic/go-test-coverage/v2 -c .testcoverage.yml
#
# Run in CI: same command after `make cover` produces coverage.out.
#
# The goal of this file is NOT to game the coverage number. Each exclusion
# below has a concrete reason — generated code, platform-conditional builds,
# hardware probes that need real GPUs to exercise meaningfully. Adding a new
# exclusion should come with a comment explaining why a test would test the
# mock instead of the code.

# Threshold gates. Build fails when the per-scope coverage drops below these.
threshold:
  # Per-file: every individual file should reach 80%. Catches a freshly-added
  # file that landed without tests.
  file: 80
  # Per-package: aggregate within a package — slightly higher because packages
  # average over multiple files (one weak file is balanced by stronger ones).
  package: 85
  # Total: the project-wide number. Set to 90 because some legitimate
  # uncoverable lines (panic recovers, defensive nil checks, init-side-effects)
  # always pull this down a few percent.
  total: 90

# Files / patterns excluded from coverage measurement entirely.
# Each entry must justify itself in a comment.
exclude:
  paths:
    # swag-generated swagger types and the embedded JSON. Regenerated by
    # the pre-commit hook from Go annotations — testing the output is
    # testing the generator, not our code.
    - ^api/docs/

    # Platform-conditional build pairs. Only one file in each pair compiles
    # on a given platform; the other shows 0/0 coverage that the tool reports
    # as 0%. CI on a single platform cannot reach 100% across both. Tested
    # via integration tests on the appropriate platform.
    - ^internal/ingestor/pull/udp_join_linux\.go$
    - ^internal/ingestor/pull/udp_join_other\.go$

    # Hardware capability probes. Run external binaries (`nvidia-smi`,
    # `vainfo`, `ffmpeg -hwaccels`) — exercising the success branches needs
    # real GPU hardware in CI. Mock-based tests would only validate the mock
    # boundary, not the real behaviour we ship.
    - ^internal/hwdetect/

    # Cmd entrypoint — wires DI graph, calls os.Exit on signal. The
    # interesting behaviour lives in the services it constructs, all of
    # which have their own coverage targets.
    - ^cmd/

    # Bench tooling — capacity-sweep scripts and report templates,
    # operator-facing tools not part of the production code path.
    - ^bench/

# Override per-file thresholds where a meaningful 80% isn't feasible.
# Each override needs a reason; treat this as a release-blocking budget.
override:
  # Stream serve listeners — RTMP/RTSP/SRT serve loops bind real TCP
  # sockets. Build-tagged integration tests cover the happy path; unit
  # coverage stays around 60% on the parts that don't need a kernel
  # socket. Lower the threshold to match what's reachable from go test
  # without --tags=integration.
  - threshold: 60
    path: ^internal/publisher/serve_(rtmp|rtsp|srt)\.go$

  # Logger init — slog handler swap-in is exercised once at process boot.
  # Per-handler config branches are thin; 70% covers the meaningful logic.
  - threshold: 70
    path: ^pkg/logger/
