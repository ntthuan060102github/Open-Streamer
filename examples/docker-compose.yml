services:
  open-streamer:
    image: ghcr.io/ntthuan060102github/open-streamer:latest
    # build:
    #   context: ..
    #   dockerfile: build/Dockerfile
    ports:
      - "8080:8080"   # REST API + HLS/DASH static serving
      - "1935:1935"   # RTMP push ingest (OBS, FFmpeg)
      - "9999:9999/udp"  # SRT push ingest
      - "8554:8554"   # RTSP play output
      - "9091:9091"   # Prometheus metrics
    environment:
      OPEN_STREAMER_SERVER_HTTP_ADDR: ":8080"
      OPEN_STREAMER_STORAGE_DRIVER: "json"
      OPEN_STREAMER_STORAGE_JSON_DIR: "/data"
      OPEN_STREAMER_BUFFER_CAPACITY: "1000"
      OPEN_STREAMER_INGESTOR_RTMP_ENABLED: "true"
      OPEN_STREAMER_INGESTOR_RTMP_ADDR: ":1935"
      OPEN_STREAMER_INGESTOR_SRT_ENABLED: "true"
      OPEN_STREAMER_INGESTOR_SRT_ADDR: ":9999"
      OPEN_STREAMER_TRANSCODER_MAX_WORKERS: "4"
      OPEN_STREAMER_TRANSCODER_FFMPEG_PATH: "ffmpeg"
      OPEN_STREAMER_TRANSCODER_MAX_RESTARTS: "5"
      OPEN_STREAMER_PUBLISHER_HLS_DIR: "/out/hls"
      OPEN_STREAMER_PUBLISHER_HLS_LIVE_SEGMENT_SEC: "4"
      OPEN_STREAMER_PUBLISHER_HLS_LIVE_WINDOW: "6"
      OPEN_STREAMER_PUBLISHER_DASH_DIR: "/out/dash"
      OPEN_STREAMER_PUBLISHER_RTSP_PORT_MIN: "8554"
      OPEN_STREAMER_MANAGER_INPUT_PACKET_TIMEOUT_SEC: "30"
      OPEN_STREAMER_METRICS_ADDR: ":9091"
      OPEN_STREAMER_LOG_LEVEL: "info"
      OPEN_STREAMER_LOG_FORMAT: "json"
    volumes:
      - ./data:/data          # JSON store (open_streamer.json lives here)
      - ./out/hls:/out/hls    # HLS segments
      - ./out/dash:/out/dash  # DASH segments
      - ./out/dvr:/out/dvr    # DVR recordings
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v3.2.1
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  grafana_data:
